<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heraclee — Gestion des Réservations</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C4A96B;--gold-l:#E8D9B5;--gold-d:#8A7245;
  --ink:#1A1612;--ink2:#2C2720;--ink3:#3D3528;
  --ink-s:#7A6E5F;--ink-xs:#9A8E82;
  --parch:#FAF7F2;--parch2:#F0EAE0;--parch3:#E8E0D4;
  --white:#fff;
  --ok-bg:#EAF2ED;--ok-txt:#2A6B3A;
  --wait-bg:#FBF4E2;--wait-txt:#8A6B1A;
  --ko-bg:#F5EAEA;--ko-txt:#8B3A3A;
  --border:rgba(196,169,107,.2);--border2:rgba(196,169,107,.4);
  --sh:0 2px 20px rgba(26,22,18,.12);--sh2:0 8px 32px rgba(26,22,18,.2);
  --r:10px;--rs:7px
}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parch);min-height:100vh}

/* ── HEADER ── */
header{background:var(--ink);height:64px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;border-bottom:1px solid var(--border)}
.hl{display:flex;align-items:center;gap:20px}
.brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--white);letter-spacing:.06em}
.brand em{font-style:italic;color:var(--gold)}
.brand-sub{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-xs);display:block;margin-top:1px}
.npill{font-size:12px;color:rgba(255,255,255,.35);text-decoration:none;padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.08);transition:all .15s}
.npill:hover{color:var(--gold);border-color:var(--border2)}
.npill.on{color:var(--gold);background:rgba(196,169,107,.1);border-color:var(--border2)}
.sync{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-xs)}
.dot{width:7px;height:7px;border-radius:50%;background:#4CAF7A;flex-shrink:0}
.dot.spin{background:var(--gold);animation:pulse 1s ease-in-out infinite}
.dot.err{background:#E55}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── VIEWS ── */
.view{display:none}.view.active{display:block}

/* ── LIST VIEW ── */
main{max-width:980px;margin:0 auto;padding:2rem 1.5rem 5rem}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:2rem}
.stat{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.slbl{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-xs);margin-bottom:6px}
.sval{font-size:28px;font-weight:500;color:var(--parch);line-height:1}
.sval.g{color:#5DBF7A}.sval.o{color:var(--gold)}
.sbar{height:2px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:10px;overflow:hidden}
.sbar-f{height:100%;background:var(--gold);border-radius:2px;transition:width .6s}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.topbar h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--parch);letter-spacing:.02em}
.btn-new{background:var(--gold);color:var(--ink);border:none;border-radius:var(--rs);padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.btn-new:hover{background:var(--gold-l)}

.filters{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.sbox{position:relative;flex:1;min-width:180px}
.sbox svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-xs);pointer-events:none}
input[type=text]{width:100%;padding:8px 10px 8px 34px;border:1px solid var(--border);border-radius:var(--rs);background:var(--ink2);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--parch);outline:none}
input[type=text]:focus{border-color:var(--border2)}
input[type=text]::placeholder{color:var(--ink-xs)}
.tabs{display:flex;gap:5px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-s);cursor:pointer;transition:all .15s}
.tab:hover{border-color:var(--border2);color:var(--parch)}
.tab.on{background:rgba(196,169,107,.12);color:var(--gold);border-color:var(--border2)}
select.sort{padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--ink2);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-s);outline:none;cursor:pointer}
.btn-ref{padding:8px 14px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-s);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-ref:hover{border-color:var(--border2);color:var(--parch)}

.metaline{font-size:12px;color:var(--ink-xs);margin-bottom:.9rem}
.metaline strong{color:var(--ink-s)}
.list{display:flex;flex-direction:column;gap:8px}
.card{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:14px;cursor:pointer;transition:all .2s;animation:fadeUp .3s ease both}
.card:hover{background:var(--ink3);border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--sh)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.av{width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;flex-shrink:0;background:rgba(196,169,107,.1);color:var(--gold)}
.ci{min-width:0}
.cvilla{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;color:var(--gold-l)}
.cclient{font-size:12px;color:var(--ink-s);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cdates{font-size:11px;color:var(--ink-xs);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:10px;white-space:nowrap;letter-spacing:.02em}
.badge.confirmed{background:rgba(74,188,100,.12);color:#5DBF7A;border:1px solid rgba(74,188,100,.2)}
.badge.pending{background:rgba(196,169,107,.12);color:var(--gold);border:1px solid var(--border)}
.badge.cancelled{background:rgba(200,60,60,.1);color:#E07070;border:1px solid rgba(200,60,60,.15)}
.cloyer{font-size:14px;font-weight:500;color:var(--parch);white-space:nowrap}
.cnuits{font-size:10px;color:var(--ink-xs)}
.cprog{font-size:10px;color:var(--ink-xs);white-space:nowrap}

.state-block{text-align:center;padding:4rem 2rem;color:var(--ink-s);font-size:14px}
.state-block .ico{font-size:40px;margin-bottom:12px;opacity:.5}
.state-block.err{color:#E07070}

/* ── DETAIL VIEW ── */
#detailView{background:var(--ink);min-height:100vh}
.detail-header{background:var(--ink2);padding:16px 1.5rem;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border)}
.btn-back{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--parch);padding:7px 14px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.btn-back:hover{background:rgba(255,255,255,.1);border-color:var(--border2)}
.detail-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--parch);font-weight:400;flex:1;letter-spacing:.02em}
.detail-villa-tag{font-size:11px;color:var(--gold);margin-top:2px;letter-spacing:.1em}
.detail-sync{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-xs)}
.prog-bar-wrap{background:rgba(255,255,255,.05);height:3px}
.prog-bar-fill{height:3px;background:var(--gold);transition:width .4s ease}

.detail-body{max-width:900px;margin:0 auto;padding:1.5rem 1.5rem 5rem}

/* SECTIONS */
.dsection{margin-bottom:10px;background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.dsection-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:10px}
.dsection-header:hover{background:rgba(255,255,255,.03)}
.dsection-title{font-size:13px;font-weight:500;color:var(--parch);display:flex;align-items:center;gap:8px;flex:1}
.dsection-title .num{font-size:10px;background:rgba(196,169,107,.2);color:var(--gold);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
.dsection-badge{font-size:10px;padding:2px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.dsection-badge.full{background:rgba(74,188,100,.12);color:#5DBF7A}
.dsection-badge.partial{background:rgba(196,169,107,.12);color:var(--gold)}
.dsection-badge.empty{background:rgba(255,255,255,.05);color:var(--ink-xs)}
.dsection-arrow{font-size:11px;color:var(--ink-xs);transition:transform .2s;flex-shrink:0}
.dsection.open .dsection-arrow{transform:rotate(180deg)}
.dsection-body{display:none;padding:16px 18px;border-top:1px solid var(--border)}
.dsection.open .dsection-body{display:block}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fgrid.one{grid-template-columns:1fr}
.fgrid.three{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;color:var(--ink-xs);font-weight:500;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--parch);background:rgba(255,255,255,.04);outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--border2);background:rgba(255,255,255,.06)}
.fg select option{background:var(--ink2);color:var(--parch)}
.fg textarea{resize:vertical;min-height:75px}

/* CHECKLIST */
.checklist{display:flex;flex-direction:column}
.ck-section-title{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--gold-d);padding:10px 0 5px;border-bottom:1px solid var(--border);margin-bottom:2px}
.ck-item{display:flex;align-items:center;gap:12px;padding:9px 2px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .1s;border-radius:5px}
.ck-item:last-child{border-bottom:none}
.ck-item:hover{background:rgba(255,255,255,.03);padding-left:8px;padding-right:8px;margin:0 -8px}
.ck-box{width:20px;height:20px;border-radius:5px;border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ck-item.done .ck-box{background:var(--gold);border-color:var(--gold)}
.ck-tick{font-size:11px;color:var(--ink);display:none;font-weight:700}
.ck-item.done .ck-tick{display:block}
.ck-label{font-size:13px;color:var(--parch);flex:1;transition:color .15s}
.ck-item.done .ck-label{color:var(--ink-xs);text-decoration:line-through}
.ck-tag{font-size:10px;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.ck-tag.log{background:rgba(74,188,100,.1);color:#5DBF7A}
.ck-tag.fin{background:rgba(100,150,230,.1);color:#7AB0E8}
.ck-tag.doc{background:rgba(196,169,107,.1);color:var(--gold)}

/* EDL */
.edl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.edl-piece{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--rs);padding:12px}
.edl-piece-title{font-size:11px;font-weight:500;color:var(--gold-l);margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.edl-piece select,.edl-piece textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:rgba(255,255,255,.04);color:var(--parch);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:6px}
.edl-piece select option{background:var(--ink2)}
.edl-piece textarea{resize:vertical;min-height:55px;margin-bottom:0}
.edl-piece select:focus,.edl-piece textarea:focus{border-color:var(--border2)}

/* INVENTAIRE */
.inv-table{width:100%;border-collapse:collapse;font-size:12px}
.inv-table th{text-align:left;padding:7px 8px;background:rgba(255,255,255,.04);color:var(--ink-xs);font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.inv-table td{padding:5px 4px;border-bottom:1px solid rgba(255,255,255,.04)}
.inv-table input,.inv-table select{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,.04);color:var(--parch);outline:none}
.inv-table select option{background:var(--ink2)}
.inv-table input:focus,.inv-table select:focus{border-color:var(--border2)}
.btn-add-row{margin-top:8px;padding:6px 14px;border:1px dashed rgba(255,255,255,.1);border-radius:var(--rs);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-xs);cursor:pointer;transition:all .15s}
.btn-add-row:hover{border-color:var(--border2);color:var(--gold)}

/* COMPTEURS */
.cpt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.cpt-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--rs);padding:14px}
.cpt-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-xs);margin-bottom:8px}
.cpt-input{width:100%;padding:9px;border:1px solid var(--border);border-radius:6px;font-size:15px;font-weight:500;text-align:center;font-family:'DM Sans',sans-serif;color:var(--gold-l);background:rgba(255,255,255,.04);outline:none}
.cpt-input:focus{border-color:var(--border2)}

/* TOAST */
.save-toast{position:fixed;bottom:24px;right:24px;background:var(--ink2);color:var(--gold);font-size:12px;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border2);box-shadow:var(--sh2);opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:500}
.save-toast.show{opacity:1;transform:none}

/* DELETE */
.btn-delete{background:transparent;border:1px solid rgba(200,60,60,.2);color:#E07070;border-radius:var(--rs);padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.btn-delete:hover{background:rgba(200,60,60,.08);border-color:rgba(200,60,60,.4)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--ink2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:600px;box-shadow:0 24px 60px rgba(0,0,0,.4);transform:translateY(20px);transition:transform .25s;margin:auto}
.modal-overlay.open .modal{transform:none}
.modal-head{background:var(--ink3);border-radius:14px 14px 0 0;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-head-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--parch);font-weight:400;letter-spacing:.04em}
.modal-close{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--parch);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,.1)}
.modal-body{padding:20px 24px}
.msect{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--gold-d);border-bottom:1px solid var(--border);padding-bottom:6px;margin:16px 0 12px}
.msect:first-child{margin-top:0}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{padding:9px 20px;border:1px solid var(--border);border-radius:var(--rs);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink-s);cursor:pointer;transition:all .15s}
.btn-cancel:hover{border-color:var(--border2);color:var(--parch)}
.btn-save{padding:9px 24px;border:none;border-radius:var(--rs);background:var(--gold);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;letter-spacing:.02em}
.btn-save:hover{background:var(--gold-l)}

@media(max-width:600px){
  .card{grid-template-columns:40px 1fr}.cr{display:none}
  .fgrid{grid-template-columns:1fr}.fgrid.three{grid-template-columns:1fr 1fr}
  .edl-grid{grid-template-columns:1fr}.cpt-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <div class="hl">
    <div>
      <div class="brand">HERACLEE <em>Agency</em></div>
      <span class="brand-sub">Gestion des réservations</span>
    </div>
    <a href="index.html" class="npill on">Dossiers</a>
    <a href="recap-reservations.html" class="npill">Récapitulatif</a>
  </div>
  <div class="sync">
    <div class="dot spin" id="syncDot"></div>
    <span id="syncLabel">Connexion…</span>
  </div>
</header>

<!-- LIST VIEW -->
<div id="listView" class="view active">
  <main>
    <div class="stats-row" id="statsRow"></div>
    <div class="topbar">
      <h1>Dossiers</h1>
      <button class="btn-new" onclick="openNewModal()">+ Nouveau dossier</button>
    </div>
    <div class="filters">
      <div class="sbox">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Rechercher villa, client…" oninput="applyFilters()">
      </div>
      <div class="tabs">
        <button class="tab on" data-st="" onclick="setTab(this)">Tous</button>
        <button class="tab" data-st="confirmed" onclick="setTab(this)">Confirmés</button>
        <button class="tab" data-st="pending" onclick="setTab(this)">En attente</button>
        <button class="tab" data-st="cancelled" onclick="setTab(this)">Annulés</button>
      </div>
      <select class="sort" id="sortSel" onchange="applyFilters()">
        <option value="date_asc">Date ↑</option>
        <option value="date_desc">Date ↓</option>
        <option value="villa">Villa A→Z</option>
      </select>
      <button class="btn-ref" onclick="loadData()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Actualiser
      </button>
    </div>
    <div class="metaline" id="metaLine"></div>
    <div id="stateBlock" class="state-block"><div class="ico">⏳</div>Chargement…</div>
    <div class="list" id="list"></div>
  </main>
</div>

<!-- DETAIL VIEW -->
<div id="detailView" class="view">
  <div class="detail-header">
    <button class="btn-back" onclick="showList()">← Dossiers</button>
    <div style="flex:1;min-width:0">
      <div class="detail-title" id="detailTitle">Dossier</div>
      <div class="detail-villa-tag" id="detailTag"></div>
    </div>
    <div class="detail-sync">
      <div class="dot spin" id="detailDot"></div>
      <span id="detailSyncLabel">…</span>
    </div>
  </div>
  <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill" style="width:0%"></div></div>
  <div class="detail-body" id="detailBody"></div>
</div>

<div class="save-toast" id="toast">✓ Sauvegardé</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOut(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-title">Nouveau dossier</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="msect">Villa & Statut</div>
      <div class="fgrid">
        <div class="fg"><label>Villa</label>
          <select id="mVilla">
            <option value="">Sélectionner…</option>
            <option>KOVA</option><option>ROSALIE</option><option>VENUS</option>
            <option>BLANCA</option><option>ROSEMARY</option><option>PEACH ON THE BEACH</option>
            <option>LA TRÉMOLIÈRE</option><option>LYS DES MERS</option><option>APP CASCADELLE</option>
          </select>
        </div>
        <div class="fg"><label>Statut</label>
          <select id="mStatut">
            <option value="attente">En attente</option>

let allData=[],activeSt='',currentId=null,saveTimer=null;

const TOTAL=CK.filter(i=>i.k).length;

function stKey(r){const s=(r.statut||'').toLowerCase();if(s.includes('confirm'))return'confirmed';if(s.includes('annul')||s.includes('cancel'))return'cancelled';return'pending';}
function stLabel(k){return{confirmed:'Confirmé',pending:'En attente',cancelled:'Annulé'}[k]||k;}
function fd(d){if(!d)return null;const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}
function nights(a,b){if(!a||!b)return null;const n=Math.round((new Date(b)-new Date(a))/86400000);return isNaN(n)?null:n+' nuit'+(n>1?'s':'');}
function initials(v){return(v||'?').replace(/[^A-Za-zÀ-ÿ ]/g,'').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';}
function countDone(r){const cl=r.checklist||{};return CK.filter(i=>i.k&&cl[i.k]).length;}

function setSt(s,l){
  ['syncDot','detailDot'].forEach(id=>{const d=document.getElementById(id);if(d)d.className='dot '+(s==='loading'?'spin':s==='error'?'err':'');});
  ['syncLabel','detailSyncLabel'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=l;});
}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

async function loadData(){
  setSt('loading','Chargement…');

  document.getElementById('stateBlock').className='state-block';
  document.getElementById('stateBlock').innerHTML='<div class="ico">⏳</div>Chargement des dossiers…';
  document.getElementById('list').innerHTML='';
  try{
    const r=await fetch(`${SB}/rest/v1/reservations?select=*&order=date_arrivee.asc`,{headers:H});
    if(!r.ok)throw new Error('HTTP '+r.status);
    allData=await r.json();
    setSt('ok','Synchronisé');
    applyFilters();
  }catch(e){
    setSt('error','Erreur');
    document.getElementById('stateBlock').className='state-block err';
    document.getElementById('stateBlock').innerHTML=`<div class="ico">⚠️</div>Erreur de connexion<br><small style="opacity:.6">${e.message}</small>`;
  }
}

function setTab(btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');activeSt=btn.dataset.st;applyFilters();}
function applyFilters(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const sort=document.getElementById('sortSel').value;
  let data=allData.filter(r=>{
    const v=(r.villa||'').toLowerCase(),c=(r.client_nom||'').toLowerCase();
    return(!q||v.includes(q)||c.includes(q))&&(!activeSt||stKey(r)===activeSt);
  });
  data=[...data].sort((a,b)=>{
    if(sort==='villa')return(a.villa||'').localeCompare(b.villa||'');
    const da=new Date(a.date_arrivee||0),db=new Date(b.date_arrivee||0);
    return sort==='date_desc'?db-da:da-db;
  });
  renderStats(data);renderList(data);
  document.getElementById('metaLine').innerHTML=data.length?`<strong>${data.length}</strong> dossier${data.length>1?'s':''} affiché${data.length>1?'s':''}` : '';
}

function renderStats(data){

  const villas=[...new Set(allData.map(r=>r.villa||'?'))].length;

    <div class="stat"><div class="slbl">En attente</div><div class="sval o">${pend}</div></div>
    <div class="stat"><div class="slbl">Villas actives</div><div class="sval">${villas}</div></div>`;

      <div class="cpt-grid">
        <div class="cpt-card"><div class="cpt-label">⚡ Électricité</div><input class="cpt-input" type="text" id="f-elec" value="${cpt.elec||''}" placeholder="kWh" onblur="debounceSave()"></div>
        <div class="cpt-card"><div class="cpt-label">💧 Eau</div><input class="cpt-input" type="text" id="f-eau" value="${cpt.eau||''}" placeholder="m³" onblur="debounceSave()"></div>
        <div class="cpt-card"><div class="cpt-label">🔥 Gaz</div><input class="cpt-input" type="text" id="f-gaz" value="${cpt.gaz||''}" placeholder="m³" onblur="debounceSave()"></div>
      </div>
    </div>
  </div>

  <div class="dsection" id="s7">
    <div class="dsection-header" onclick="toggleSec('s7')">
      <div class="dsection-title"><span class="num">7</span>Inventaire</div>
      <span class="dsection-arrow">▾</span>
    </div>
    <div class="dsection-body">${invHtml}</div>
  </div>

  <div class="dsection" id="s8">
    <div class="dsection-header" onclick="toggleSec('s8')">
      <div class="dsection-title"><span class="num">8</span>Notes générales</div>
      <span class="dsection-arrow">▾</span>
    </div>
    <div class="dsection-body">
      <div class="fgrid one">
        <div class="fg"><label>Notes générales</label>${ta('f-notes',r.notes_generales)}</div>
        <div class="fg"><label>Observations fin de séjour</label>${ta('f-obs',r.observations_generales)}</div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px">
        <button class="btn-delete" onclick="deleteDossier()">🗑 Supprimer ce dossier</button>
      </div>
    </div>
  </div>`;
}

function toggleSec(id){document.getElementById(id).classList.toggle('open');}

async function toggleCk(key,el){
  el.classList.toggle('done');
  const r=allData.find(x=>x.id===currentId);if(!r)return;
  const cl={...(r.checklist||{})};cl[key]=el.classList.contains('done');r.checklist=cl;
  const done=countDone(r);
  const badge=document.getElementById('ckBadge');
  if(badge){badge.textContent=done+'/'+TOTAL;badge.className='dsection-badge '+(done===TOTAL?'full':done>0?'partial':'empty');}
  document.getElementById('progFill').style.width=Math.round(done/TOTAL*100)+'%';
  document.getElementById('detailTag').textContent=(r.villa||'').toUpperCase()+' · '+done+'/'+TOTAL+' étapes complétées';
  setSt('loading','Sauvegarde…');
  try{
    await fetch(`${SB}/rest/v1/reservations?id=eq.${currentId}`,{method:'PATCH',headers:H,body:JSON.stringify({checklist:cl})});
    setSt('ok','Sauvegardé');showToast();
  }catch(e){setSt('error','Erreur');}
}

function saveEdlField(piece,field,val){
  const r=allData.find(x=>x.id===currentId);if(!r)return;
  const edl={...(r.edl_pieces||{})};if(!edl[piece])edl[piece]={};edl[piece][field]=val;r.edl_pieces=edl;
  debounceSave();
}

function saveInv(){
  const r=allData.find(x=>x.id===currentId);if(!r)return;
  const rows=document.querySelectorAll('#invBody tr'),inv=[];
  rows.forEach((tr,i)=>{inv.push({nom:tr.querySelector(`[data-nom="${i}"]`)?.value||'',qte:tr.querySelector(`[data-qte="${i}"]`)?.value||'',etat:tr.querySelector(`[data-etat="${i}"]`)?.value||'',remarque:tr.querySelector(`[data-rem="${i}"]`)?.value||''});});
  r.inventaire=inv;debounceSave();
}

function addInvRow(){
  const tbody=document.getElementById('invBody'),i=tbody.rows.length;
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><input type="text" value="" onblur="saveInv()" data-nom="${i}"></td>
    <td><input type="text" value="" style="width:50px" onblur="saveInv()" data-qte="${i}"></td>
    <td><select onchange="saveInv()" data-etat="${i}"><option>–</option><option>Bon état</option><option>Usure</option><option>Manquant</option><option>Cassé</option></select></td>
    <td><input type="text" value="" onblur="saveInv()" data-rem="${i}"></td>`;
  tbody.appendChild(tr);
}

function debounceSave(){clearTimeout(saveTimer);saveTimer=setTimeout(autoSave,1200);}
async function autoSave(){
  if(!currentId)return;
  setSt('loading','Sauvegarde…');
  const r=allData.find(x=>x.id===currentId);
  const g=id=>{const el=document.getElementById(id);return el?el.value:null;};
  const gn=id=>{const v=parseFloat(g(id));return isNaN(v)?null:v;};
  const gi=id=>{const v=parseInt(g(id));return isNaN(v)?null:v;};
  const rows=document.querySelectorAll('#invBody tr'),inv=[];
  rows.forEach((tr,i)=>{inv.push({nom:tr.querySelector(`[data-nom="${i}"]`)?.value||'',qte:tr.querySelector(`[data-qte="${i}"]`)?.value||'',etat:tr.querySelector(`[data-etat="${i}"]`)?.value||'',remarque:tr.querySelector(`[data-rem="${i}"]`)?.value||''});});
  const payload={
    villa:g('f-villa'),statut:g('f-statut'),
    client_nom:g('f-nom'),client_nationalite:g('f-nat'),client_tel:g('f-tel'),client_email:g('f-email'),client_adresse:g('f-adresse'),
    date_arrivee:g('f-arrivee')||null,date_depart:g('f-depart')||null,
    nb_adultes:gi('f-adultes'),nb_enfants:gi('f-enfants'),animaux:g('f-animaux'),
    loyer_total:gn('f-loyer'),acompte:gn('f-acompte'),solde:gn('f-solde'),
    type_acompte:g('f-type-acompte'),depot_garantie:gn('f-depot'),commission:gn('f-commission'),
    proprio_total:gn('f-proprio-total'),type_acompte_proprio:g('f-type-acompte-proprio'),
    proprio_acompte:gn('f-proprio-acompte'),proprio_solde:gn('f-proprio-solde'),
    proprio_depot:gn('f-proprio-depot'),date_versement_proprio:g('f-dsolde-proprio')||null,
    statut_reversement:g('f-statut-reversement'),
    ref_contrat:g('f-ref'),notes_generales:g('f-notes'),notes_contrat:g('f-notes-contrat'),
    notes_panier:g('f-notes-panier'),date_envoi_infos:g('f-dinfos')||null,
    date_encaissement_solde:g('f-dsolde')||null,heure_prevue:g('f-hprev'),heure_reelle:g('f-hreel'),
    observations_generales:g('f-obs'),date_signature:g('f-dsig')||null,lieu_signature:g('f-lsig'),
    compteurs:{elec:g('f-elec'),eau:g('f-eau'),gaz:g('f-gaz')},
    checklist:r?r.checklist:{},edl_pieces:r?r.edl_pieces:{},inventaire:inv,
  };
  try{
    const res=await fetch(`${SB}/rest/v1/reservations?id=eq.${currentId}`,{method:'PATCH',headers:H,body:JSON.stringify(payload)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    if(r)Object.assign(r,payload);
    setSt('ok','Sauvegardé');showToast();
    document.getElementById('detailTitle').textContent=payload.client_nom?`${(payload.villa||'').toUpperCase()} — ${payload.client_nom}`:(payload.villa||'Dossier');
  }catch(e){setSt('error','Erreur sauvegarde');}
}

function openNewModal(){document.getElementById('modalOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}
function closeModalOut(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

async function createDossier(){
  const payload={
    villa:document.getElementById('mVilla').value||null,statut:document.getElementById('mStatut').value,
    client_nom:document.getElementById('mNom').value||null,client_nationalite:document.getElementById('mNat').value||null,
    client_tel:document.getElementById('mTel').value||null,client_email:document.getElementById('mEmail').value||null,
    date_arrivee:document.getElementById('mArrivee').value||null,date_depart:document.getElementById('mDepart').value||null,
    nb_adultes:parseInt(document.getElementById('mAdultes').value)||null,nb_enfants:parseInt(document.getElementById('mEnfants').value)||0,
    loyer_total:parseFloat(document.getElementById('mLoyer').value)||null,acompte:parseFloat(document.getElementById('mAcompte').value)||null,
    checklist:{},edl_pieces:{},inventaire:[],compteurs:{}
  };
  try{
    const res=await fetch(`${SB}/rest/v1/reservations`,{method:'POST',headers:H,body:JSON.stringify(payload)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const created=await res.json();
    closeModal();await loadData();
    if(created&&created[0])openDetail(created[0].id);
  }catch(e){alert('Erreur : '+e.message);}
}

async function deleteDossier(){
  if(!confirm('Supprimer ce dossier définitivement ?'))return;
  try{
    await fetch(`${SB}/rest/v1/reservations?id=eq.${currentId}`,{method:'DELETE',headers:H});
    showList();
  }catch(e){alert('Erreur : '+e.message);}
}

loadData();
</script>
</body>
</html>
