<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F8FAFA;--bg2:#FFFFFF;--fg:#0D1A1A;
  --acc:#00B8B8;--acc2:#007A7A;
  --res:#1A1A2E;--res-t:#FFFFFF;
  --av:#00B8B8;--av-t:#FFFFFF;
  --own:#8B3A8B;--own-t:#fff;
  --muted:#6B8A8A;--border:rgba(0,184,184,0.2);
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;}
.hdr{background:var(--fg);border-bottom:2px solid var(--acc);padding:16px 20px;position:sticky;top:0;z-index:50;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr-logo{font-family:"Cormorant Garamond",serif;font-size:11px;letter-spacing:0.5em;color:var(--acc);text-transform:uppercase;}
.hdr-title{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:300;color:#FFFFFF;letter-spacing:0.06em;margin-top:2px;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.admin-btn{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid rgba(0,184,184,0.3);background:transparent;color:var(--acc);cursor:pointer;font-family:"DM Sans",sans-serif;}
.admin-btn.active{background:var(--acc);color:var(--fg);}

.nav-mois{display:flex;gap:6px;overflow-x:auto;padding:12px 20px;background:var(--fg);border-bottom:1px solid rgba(0,184,184,0.15);scrollbar-width:none;}
.nav-mois::-webkit-scrollbar{display:none;}
.nav-btn{font-size:11px;font-family:"DM Sans",sans-serif;padding:5px 14px;border-radius:20px;border:1px solid rgba(0,184,184,0.25);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.nav-btn.active,.nav-btn:hover{background:var(--acc);color:var(--fg);border-color:var(--acc);font-weight:500;}

.content{padding:16px 16px 60px;max-width:500px;margin:0 auto;width:100%;}

.hero-card{background:var(--fg);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid rgba(0,184,184,0.2);}
.hero-title{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:300;color:#fff;letter-spacing:0.04em;margin-bottom:6px;}
.hero-desc{font-size:11px;color:var(--muted);line-height:1.7;}
.hero-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.hero-tag{font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(0,184,184,0.12);color:var(--acc);border:1px solid rgba(0,184,184,0.2);}

.sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-bottom:12px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--acc);}
.sync-dot.loading{animation:pulse 1s infinite;}
.sync-dot.error{background:#E53E3E;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.mc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,184,184,0.06);}
.mn{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:300;color:var(--fg);margin-bottom:10px;text-align:center;letter-spacing:0.04em;}
.dh,.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dh div{font-size:10px;color:var(--muted);text-align:center;padding:2px 0;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;}
.dg div{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:6px;transition:transform 0.1s;}
.dg div.av{background:var(--av);color:var(--av-t);font-weight:500;}
.dg div.res{background:var(--res);color:var(--res-t);font-weight:500;}
.dg div.own{background:var(--own);color:var(--own-t);font-weight:500;}
.dg div.past{color:var(--muted);opacity:0.3;background:transparent;}
.admin-mode .dg div:not(.past):not(.empty){cursor:pointer;}
.admin-mode .dg div:not(.past):not(.empty):hover{transform:scale(1.1);box-shadow:0 2px 8px rgba(0,0,0,0.15);}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.leg-dot{width:10px;height:10px;border-radius:3px;}
.leg-dot.av{background:var(--av);} .leg-dot.res{background:var(--res);} .leg-dot.own{background:var(--own);}

.admin-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;display:none;}
.admin-panel.open{display:block;}
.admin-title{font-size:11px;font-weight:500;color:var(--acc);margin-bottom:10px;letter-spacing:0.1em;text-transform:uppercase;}
.admin-hint{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
.admin-login{display:flex;gap:8px;}
.admin-input{flex:1;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-family:"DM Sans",sans-serif;font-size:13px;background:var(--bg);color:var(--fg);}
.admin-input:focus{outline:none;border-color:var(--acc);}
.admin-ok{background:var(--acc);color:var(--fg);border:none;border-radius:7px;padding:8px 14px;font-family:"DM Sans",sans-serif;font-size:13px;cursor:pointer;font-weight:500;}
.admin-err{font-size:11px;color:#E53E3E;margin-top:6px;display:none;}
.quit-btn{width:100%;margin-bottom:10px;background:rgba(0,0,0,0.1);color:var(--muted);border:none;border-radius:7px;padding:8px;font-family:"DM Sans",sans-serif;font-size:12px;cursor:pointer;}
.status-selector{display:flex;gap:6px;margin-bottom:4px;}
.stat-btn{flex:1;padding:7px;border-radius:7px;border:1px solid var(--border);font-family:"DM Sans",sans-serif;font-size:11px;cursor:pointer;background:var(--bg);color:var(--fg);transition:all 0.15s;}
.stat-btn.sel-av{background:var(--av);color:var(--fg);border-color:var(--av);font-weight:500;}
.stat-btn.sel-res{background:var(--res);color:white;border-color:var(--res);font-weight:500;}
.stat-btn.sel-own{background:var(--own);color:white;border-color:var(--own);font-weight:500;}

.desc-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.desc-title{font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:400;color:var(--fg);margin-bottom:8px;letter-spacing:0.02em;}
.desc-text{font-size:12px;color:var(--muted);line-height:1.75;}
.contact-btn{display:block;width:100%;background:var(--acc);color:var(--fg);border:none;border-radius:10px;padding:14px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;text-align:center;cursor:pointer;text-decoration:none;letter-spacing:0.04em;}
.contact-btn:hover{background:var(--acc2);color:white;}
</style>
</head>

<script>
const SUPA_URL = 'https://fgocsdozvgkpkjbzuyyp.supabase.co';
const SUPA_KEY = 'sb_publishable_wXSjTHbfXYYXcU2-Af8w1g_pnkRuYA6';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);
const VILLA = 'domaine-arts';
const ADMIN_CODE = 'domainearts2026';
const TODAY = new Date();
let avail = {};
let isAdmin = false;
let currentMode = 'av';

// ✅ Affichage immédiat du mois courant — AVANT loadData
showMonths();

function setSync(state, msg) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state==='loading' ? ' loading' : '') + (state==='error' ? ' error' : '');
  document.getElementById('syncLabel').textContent = msg;
}

async function loadData() {
  setSync('loading', 'Chargement…');
  const { data, error } = await db.from('availability').select('date_key,status').eq('villa', VILLA);
  if (!error && data) {
    data.forEach(r => {
      const el = document.querySelector('[data-key="' + r.date_key + '"]');
      if (el && !el.classList.contains('past')) {
        el.className = r.status;
        el.setAttribute('onclick', "handleClick(this,'" + r.date_key + "')");
        avail[r.date_key] = r.status;
      }
    });
  }
  // Remplir avail pour les dates non présentes dans Supabase
  for (let m=5; m<=10; m++) {
    const days = new Date(2026, m, 0).getDate();
    for (let d=1; d<=days; d++) {
      const key = '2026-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      if (!avail[key]) {
        const dt = new Date(2026, m-1, d);
        avail[key] = dt < new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()) ? 'past' : 'av';
      }
    }
  }
  setSync('ok', 'Synchronisé ✓');
}

function showMonths() {
  const m = new Date().getMonth() + 1;
  const cur = (m >= 5 && m <= 10) ? m : 5;
  const btns = document.querySelectorAll('.nav-btn');
  showMonth(cur, btns[cur - 5]);
}

function showMonth(m, btn) {
  document.querySelectorAll('.mc').forEach(el => el.style.display = 'none');
  const el = document.getElementById('m-' + m);
  if (el) el.style.display = 'block';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('open'); }

function checkAdmin() {
  if (document.getElementById('adminPw').value === ADMIN_CODE) {
    isAdmin = true;
    document.getElementById('adminLoginWrap').style.display = 'none';
    document.getElementById('adminActiveWrap').style.display = 'block';
    document.getElementById('adminToggle').classList.add('active');
    document.getElementById('adminToggle').textContent = '✓ Admin';
    document.body.classList.add('admin-mode');
  } else {
    document.getElementById('adminErr').style.display = 'block';
  }
}

function logoutAdmin() {
  isAdmin = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('adminToggle').classList.remove('active');
  document.getElementById('adminToggle').textContent = '⚙ Admin';
  document.getElementById('adminPanel').classList.remove('open');
  document.getElementById('adminLoginWrap').style.display = 'block';
  document.getElementById('adminActiveWrap').style.display = 'none';
  document.getElementById('adminPw').value = '';
}

function setMode(mode) {
  currentMode = mode;
  ['av','res','own'].forEach(m => {
    const btn = document.getElementById('btn-' + m);
    btn.className = 'stat-btn' + (m === mode ? ' sel-' + m : '');
  });
}

async function handleClick(el, key) {
  if (!isAdmin || el.classList.contains('past')) return;
  avail[key] = currentMode;
  el.className = currentMode;
  el.setAttribute('onclick', "handleClick(this,'" + key + "')");
  setSync('loading', 'Sauvegarde…');
  const { error } = await db.from('availability').upsert(
    { villa: VILLA, date_key: key, status: currentMode },
    { onConflict: 'villa,date_key' }
  );
  setSync(error ? 'error' : 'ok', error ? 'Erreur sauvegarde' : 'Sauvegardé ✓');
  if (!error) setTimeout(() => setSync('ok', 'Synchronisé'), 2000);
}

loadData();
<\/script>
